# E2E-only override: adds a dev-mode LiveKit server and points noda at it.
# Used exclusively by run.sh (never in production).
#
# The production compose pulls the released ghcr.io/chimpanze/noda image, but
# e2e must gate LOCAL source (this is the noda monorepo — core changes can break
# homebase), so both runtime services are pinned back to a local build here.
services:
  livekit:
    image: livekit/livekit-server:v1.9.0
    command: ["--dev", "--bind", "0.0.0.0"]

  noda:
    build: ../..
    image: ""
    depends_on:
      livekit:
        condition: service_started

  migrate:
    build: ../..
    image: ""
