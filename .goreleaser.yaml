# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

before:
  hooks:
    - sh -c "cd editor && npm ci"
    - sh -c "cd editor && npm run build"
    - sh -c "rm -rf editorfs/dist && cp -r editor/dist editorfs/dist"

builds:
  - id: noda
    main: ./cmd/noda
    binary: noda
    env:
      - CGO_ENABLED=1
    flags:
      - -tags=embed_editor
    ldflags:
      - -X main.Version={{.Version}}
      - -X main.Commit={{.ShortCommit}}
      - -X main.BuildTime={{.Date}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: noda
    ids:
      - noda
    name_template: "noda_{{.Version}}_{{.Os}}_{{.Arch}}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

release:
  github:
    owner: chimpanze
    name: noda
  header: |
    ## Install

    **macOS / Linux:**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/chimpanze/noda/main/install.sh | sh
    ```

    **Windows:** Download the `.zip` for your architecture below, extract `noda.exe`, and add its directory to your `PATH`.
    See the [installation docs](https://github.com/chimpanze/noda/blob/main/docs/01-getting-started/installation.md) for details.
