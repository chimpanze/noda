name: Benchmarks

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks on current branch
        run: go test ./... -bench=. -benchmem -count=5 -run='^$' -timeout=10m > new.txt 2>&1

      - name: Run benchmarks on base branch
        if: github.event_name == 'pull_request'
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}
          go test ./... -bench=. -benchmem -count=5 -run='^$' -timeout=10m > old.txt 2>&1
          git checkout ${{ github.sha }}

      - name: Compare benchmarks
        if: github.event_name == 'pull_request'
        id: benchstat
        run: |
          result=$(benchstat old.txt new.txt 2>&1 || true)
          echo "BENCHSTAT<<EOF" >> "$GITHUB_OUTPUT"
          echo "$result" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          # Check for regressions: >15% increase in ns/op or any increase in allocs/op
          if echo "$result" | grep -E '\+[1-9][5-9]\.|\+[2-9][0-9]\.' | grep -q 'sec/op'; then
            echo "regression=true" >> "$GITHUB_OUTPUT"
          else
            echo "regression=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment benchmark results on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v8
        with:
          script: |
            const body = `## Benchmark Comparison

            <details>
            <summary>${'${{ steps.benchstat.outputs.regression }}' === 'true' ? '⚠️ Potential regression detected' : '✅ No significant regressions'}</summary>

            \`\`\`
            ${{ steps.benchstat.outputs.BENCHSTAT }}
            \`\`\`

            </details>`;

            // Find and update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('## Benchmark Comparison'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Save weekly baseline
        if: github.event_name == 'schedule'
        uses: actions/upload-artifact@v6
        with:
          name: benchmark-baseline-${{ github.run_id }}
          path: new.txt
          retention-days: 90
