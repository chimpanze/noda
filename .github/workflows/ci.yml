name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.9"
          cache: true

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m

      - name: Run tests with coverage
        run: make test-coverage

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${COVERAGE}%"
          if [ "$(echo "$COVERAGE < 75" | bc)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below 75% threshold"
            exit 1
          fi

      - name: Go vulnerability check
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Build
        run: make build

  editor:
    name: Editor (lint, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Install dependencies
        run: cd editor && npm ci

      - name: Lint
        run: cd editor && npm run lint

      - name: Unit tests
        run: cd editor && npm test

      - name: Build
        run: cd editor && npm run build

      - name: Audit dependencies
        run: cd editor && npm audit --omit=dev || true

  playwright:
    name: Editor E2E
    runs-on: ubuntu-latest
    needs: [editor]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Install dependencies
        run: cd editor && npm ci

      - name: Build editor
        run: cd editor && npm run build

      - name: Install Playwright browsers
        run: cd editor && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd editor && npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: editor/playwright-report/
          retention-days: 7
