name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    # Native runner per arch: the old aarch64 cross-compile installed
    # libvips-dev:arm64 from ports.ubuntu.com, which regularly skews against
    # the amd64 archive's point releases and breaks apt resolution (bit the
    # v0.0.5 release). ubuntu-24.04-arm builds arm64 natively — no foreign
    # architecture, no cross toolchain, no PKG_CONFIG_PATH override.
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-latest
          - goarch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips
        run: |
          sudo apt-get update
          sudo apt-get install -y libvips-dev

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        run: make build-editor

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags embed_editor -ldflags "\
            -X main.Version=${VERSION} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o noda ./cmd/noda

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="noda_${VERSION}_linux_${{ matrix.goarch }}.tar.gz"
          tar -czf "${ARCHIVE}" noda LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-linux-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-darwin-arm64:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips
        run: brew install vips

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        run: make build-editor

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags embed_editor -ldflags "\
            -X main.Version=${VERSION} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o noda ./cmd/noda

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="noda_${VERSION}_darwin_arm64.tar.gz"
          tar -czf "${ARCHIVE}" noda LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-darwin-arm64
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-darwin-amd64:
    runs-on: macos-15-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips
        run: brew install vips

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        run: make build-editor

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: amd64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags embed_editor -ldflags "\
            -X main.Version=${VERSION} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o noda ./cmd/noda

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="noda_${VERSION}_darwin_amd64.tar.gz"
          tar -czf "${ARCHIVE}" noda LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-darwin-amd64
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin-arm64, build-darwin-amd64]
    if: github.repository == 'chimpanze/noda'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: noda-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum noda_* > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Noda ${{ github.ref_name }}" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo '')" \
            artifacts/*
