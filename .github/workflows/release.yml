name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - goarch: amd64
            cc: gcc
          - goarch: arm64
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips and cross-compile tools
        run: |
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            sudo dpkg --add-architecture arm64
            # Only add arch qualifier to Ubuntu official sources, not third-party
            for f in /etc/apt/sources.list.d/ubuntu.sources; do
              if [ -f "$f" ]; then
                sudo sed -i 's/^Architectures:.*/Architectures: amd64 arm64/' "$f"
              fi
            done
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs) main restricted universe multiverse" | sudo tee /etc/apt/sources.list.d/arm64.list
            echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports $(lsb_release -cs)-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list.d/arm64.list
            sudo apt-get update
            sudo apt-get install -y libvips-dev:arm64 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
          else
            sudo apt-get update
            sudo apt-get install -y libvips-dev
          fi

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        run: make build-editor

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
          CC: ${{ matrix.cc }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          PKG_CONFIG_PATH_OVERRIDE=""
          if [ "${{ matrix.goarch }}" = "arm64" ]; then
            export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
          fi
          go build -tags embed_editor -ldflags "\
            -X main.Version=${VERSION} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o noda ./cmd/noda

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="noda_${VERSION}_linux_${{ matrix.goarch }}.tar.gz"
          tar -czf "${ARCHIVE}" noda LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-linux-${{ matrix.goarch }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-darwin-arm64:
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips
        run: brew install vips

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        run: make build-editor

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: arm64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags embed_editor -ldflags "\
            -X main.Version=${VERSION} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o noda ./cmd/noda

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="noda_${VERSION}_darwin_arm64.tar.gz"
          tar -czf "${ARCHIVE}" noda LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-darwin-arm64
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-darwin-amd64:
    runs-on: macos-15-intel
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips
        run: brew install vips

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        run: make build-editor

      - name: Build binary
        env:
          CGO_ENABLED: "1"
          GOOS: darwin
          GOARCH: amd64
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go build -tags embed_editor -ldflags "\
            -X main.Version=${VERSION} \
            -X main.Commit=$(git rev-parse --short HEAD) \
            -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o noda ./cmd/noda

      - name: Create archive
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ARCHIVE="noda_${VERSION}_darwin_amd64.tar.gz"
          tar -czf "${ARCHIVE}" noda LICENSE README.md
          echo "ARCHIVE=${ARCHIVE}" >> $GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-darwin-amd64
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install libvips
        shell: pwsh
        run: |
          $VIPS_VERSION = "8.17.0"
          $VIPS_URL = "https://github.com/libvips/build-win64-mxe/releases/download/v${VIPS_VERSION}/vips-dev-w64-all-${VIPS_VERSION}.zip"
          Invoke-WebRequest -Uri $VIPS_URL -OutFile vips.zip
          Expand-Archive vips.zip -DestinationPath C:\vips
          $vipsDir = Get-ChildItem C:\vips -Directory | Select-Object -First 1
          echo "PKG_CONFIG_PATH=$($vipsDir.FullName)\lib\pkgconfig" >> $env:GITHUB_ENV
          echo "CGO_CFLAGS=-I$($vipsDir.FullName)\include" >> $env:GITHUB_ENV
          echo "CGO_LDFLAGS=-L$($vipsDir.FullName)\lib" >> $env:GITHUB_ENV
          echo "$($vipsDir.FullName)\bin" >> $env:GITHUB_PATH

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: editor/package-lock.json

      - name: Build editor assets
        shell: pwsh
        run: |
          cd editor; npm ci --silent; npm run build; cd ..
          if (Test-Path editorfs/dist) { Remove-Item -Recurse -Force editorfs/dist }
          Copy-Item -Recurse editor/dist editorfs/dist

      - name: Build binary
        shell: pwsh
        env:
          CGO_ENABLED: "1"
          GOOS: windows
          GOARCH: amd64
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          $COMMIT = git rev-parse --short HEAD
          $BUILD_TIME = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
          go build -tags embed_editor -ldflags `
            "-X main.Version=${VERSION} -X main.Commit=${COMMIT} -X main.BuildTime=${BUILD_TIME}" `
            -o noda.exe ./cmd/noda

      - name: Create archive
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          $ARCHIVE = "noda_${VERSION}_windows_amd64.zip"
          Compress-Archive -Path noda.exe, LICENSE, README.md -DestinationPath $ARCHIVE
          echo "ARCHIVE=$ARCHIVE" >> $env:GITHUB_ENV

      - name: Upload archive
        uses: actions/upload-artifact@v7
        with:
          name: noda-windows-amd64
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    runs-on: ubuntu-latest
    needs: [build-linux, build-darwin-arm64, build-darwin-amd64, build-windows]
    if: github.repository == 'chimpanze/noda'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: noda-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum noda_* > checksums.txt
          cat checksums.txt

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Noda ${{ github.ref_name }}" \
            --generate-notes \
            --notes-start-tag "$(git describe --tags --abbrev=0 ${{ github.ref_name }}^ 2>/dev/null || echo '')" \
            artifacts/*
