services:
  livekit:
    image: livekit/livekit-server:latest
    # --dev uses placeholder keys devkey/secret; --bind is required or the
    # server listens on 127.0.0.1 inside the container and the published
    # port never answers.
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880" # WebSocket signalling + HTTP API
      - "7881:7881" # WebRTC over TCP
      - "7882:7882/udp" # WebRTC over UDP
