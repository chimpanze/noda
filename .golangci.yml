run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - gosec
    - ineffassign
    - staticcheck
    - unused
    - misspell
    # Keeps the Go 1.21+ stdlib-idiom adoption from #410 from drifting back.
    # Without this the count silently climbed to 148 before anyone noticed,
    # because these only surfaced via gopls in-editor.
    - modernize
  exclusions:
    paths:
      # Go code vendored inside npm packages (the `flatted` package ships a Go
      # implementation under the module root). Third-party, not ours to lint.
      - editor/node_modules
    rules:
      # G101: false positives on example/test credential strings
      - linters: [gosec]
        text: "G101"
      # G115: integer overflow in controlled contexts (loop counters, dep counts)
      - linters: [gosec]
        text: "G115"
      # G301/G306: relaxed file permissions in internal tooling, CLI scaffolding, plugins, and tests
      - linters: [gosec]
        text: "G30[16]"
        path: (_test\.go|internal/|cmd/|plugins/)
      # G304: file reads from constructed paths in internal code, CLI scaffolding, and tests
      - linters: [gosec]
        text: "G304"
        path: (_test\.go|internal/|cmd/)
      # G703: taint-analysis path-traversal variant of G304, cookbook runner only —
      # the seed-copy in runner.go IS the feature (copying project files into the
      # per-test data dir) and the test's ReadFile is the assertion itself, so an
      # exclusion (not restructuring) is the right call here.
      - linters: [gosec]
        text: "G703"
        path: internal/testing/cookbook/
      # G107: HTTP requests with a variable URL, cookbook runner only — the
      # "variable" URL is always the runner's own COOKBOOK_BASE_URL (an
      # ephemeral 127.0.0.1 listener the runner itself reserved) plus a
      # project-controlled path, never attacker input.
      - linters: [gosec]
        text: "G107"
        path: internal/testing/cookbook/
      # G124: request cookies in tests carry no attributes on the wire
      - linters: [gosec]
        text: "G124"
        path: _test\.go
      # G118: false positive when cancel is stored in struct field
      - linters: [gosec]
        text: "G118"
        path: internal/(wasm|worker)/
      # G120: test HTTP handlers don't need body size limits
      - linters: [gosec]
        text: "G120"
        path: _test\.go
      # SA5011: false positive on the `if p == nil { t.Fatal(...) }` guard
      # followed by a dereference — t.Fatal terminates the test, so the
      # pointer cannot be nil at the later use. staticcheck loses that only
      # when `modernize` is also enabled (analyzer ordering); the same code
      # reports clean without it, and 10 other instances of the identical
      # pattern in this repo are not flagged. Scoped to tests: a nil deref in
      # a test fails loudly on its own.
      - linters: [staticcheck]
        text: "SA5011"
        path: _test\.go

formatters:
  enable:
    - gofmt

version: "2"
