run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - gosec
    - ineffassign
    - staticcheck
    - unused
    - misspell
  exclusions:
    rules:
      # G101: false positives on example/test credential strings
      - linters: [gosec]
        text: "G101"
      # G115: integer overflow in controlled contexts (loop counters, dep counts)
      - linters: [gosec]
        text: "G115"
      # G301/G306: relaxed file permissions in internal tooling, CLI scaffolding, plugins, and tests
      - linters: [gosec]
        text: "G30[16]"
        path: (_test\.go|internal/|cmd/|plugins/)
      # G304: file reads from constructed paths in internal code, CLI scaffolding, and tests
      - linters: [gosec]
        text: "G304"
        path: (_test\.go|internal/|cmd/)
      # G703: taint-analysis path-traversal variant of G304, cookbook runner only —
      # the seed-copy in runner.go IS the feature (copying project files into the
      # per-test data dir) and the test's ReadFile is the assertion itself, so an
      # exclusion (not restructuring) is the right call here.
      - linters: [gosec]
        text: "G703"
        path: internal/testing/cookbook/
      # G124: request cookies in tests carry no attributes on the wire
      - linters: [gosec]
        text: "G124"
        path: _test\.go
      # G118: false positive when cancel is stored in struct field
      - linters: [gosec]
        text: "G118"
        path: internal/(wasm|worker)/
      # G120: test HTTP handlers don't need body size limits
      - linters: [gosec]
        text: "G120"
        path: _test\.go

formatters:
  enable:
    - gofmt

version: "2"
